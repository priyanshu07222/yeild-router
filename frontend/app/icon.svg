  <circle cx="20" cy="16" r="2" fill="#8795B3"/>
  <circle cx="24" cy="12" r="2" fill="#8795B3"/>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172B;stop-opacity:0.9" />
